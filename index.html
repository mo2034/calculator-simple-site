<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حاسبة تعاونية</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f3f4f6; color: #111827; padding: 16px; }
    .container { max-width: 760px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.08); margin-bottom: 14px; }
    h1 { margin: 0 0 12px; font-size: 1.35rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }
    input, select, button { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; }
    button { cursor: pointer; background: #2563eb; color: #fff; border: none; }
    button.secondary { background: #4b5563; }
    .status { margin-top: 8px; font-size: .9rem; color: #374151; }
    .operation { font-size: 1.8rem; padding: 12px; border-radius: 10px; background: #111827; color: #fff; text-align: left; direction: ltr; min-height: 60px; }
    .meta { font-size: .9rem; color: #6b7280; margin-top: 8px; }
    .help { font-size: .9rem; color: #4b5563; line-height: 1.6; }
    .warn { background: #fef3c7; border: 1px solid #f59e0b; border-radius: 8px; padding: 10px; font-size: .9rem; margin-top: 10px; }
    code { direction: ltr; display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>حاسبة تعاونية (لاب + موبايل)</h1>
      <div class="row">
        <input id="roomId" placeholder="كود الغرفة (مثال: room-123)" />
        <select id="role">
          <option value="writer">كاتب العملية</option>
          <option value="reviewer">مصحح العملية</option>
        </select>
      </div>
      <div class="row" style="margin-top:8px;">
        <button id="joinBtn">دخول الغرفة</button>
        <button id="copyBtn" class="secondary">نسخ كود الغرفة</button>
      </div>
      <div id="status" class="status">غير متصل</div>
      <div class="warn">لتفعيل المزامنة بين جهازين مختلفين، ضع إعدادات Firebase داخل <code>firebaseConfig</code> وفعّل Realtime Database.</div>
    </div>

    <div class="card">
      <div class="operation" id="liveOperation">0</div>
      <div class="meta" id="metaInfo">لا يوجد نشاط بعد</div>
    </div>

    <div class="card">
      <div class="row">
        <input id="expressionInput" placeholder="اكتب العملية مثل: 12+5*2" />
        <button id="sendBtn">إرسال العملية</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <button id="calcBtn" class="secondary">احسب النتيجة</button>
        <input id="resultInput" placeholder="النتيجة" readonly />
      </div>
      <p class="help">الكاتب يرسل العملية، والمصحح يراها فورًا ويعدلها ثم يرسل التصحيح.</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "REPLACE_ME",
      authDomain: "REPLACE_ME",
      databaseURL: "REPLACE_ME",
      projectId: "REPLACE_ME",
      storageBucket: "REPLACE_ME",
      messagingSenderId: "REPLACE_ME",
      appId: "REPLACE_ME"
    };

    const roomIdEl = document.getElementById("roomId");
    const roleEl = document.getElementById("role");
    const statusEl = document.getElementById("status");
    const liveOperationEl = document.getElementById("liveOperation");
    const metaInfoEl = document.getElementById("metaInfo");
    const expressionInputEl = document.getElementById("expressionInput");
    const resultInputEl = document.getElementById("resultInput");
    const joinBtn = document.getElementById("joinBtn");
    const copyBtn = document.getElementById("copyBtn");
    const sendBtn = document.getElementById("sendBtn");
    const calcBtn = document.getElementById("calcBtn");

    let db = null;
    let roomRef = null;
    let currentRole = "writer";

    function hasValidFirebaseConfig() {
      return firebaseConfig.apiKey !== "REPLACE_ME" && firebaseConfig.databaseURL !== "REPLACE_ME";
    }

    if (hasValidFirebaseConfig()) {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
    } else {
      statusEl.textContent = "Firebase غير مفعل بعد - أدخل بيانات firebaseConfig.";
    }

    function safeCalc(exp) {
      const cleaned = exp.replace(/[^0-9+\-*/%.() ]/g, "");
      if (!cleaned.trim()) return "";
      try {
        const value = Function("return (" + cleaned + ")")();
        if (!Number.isFinite(value)) return "Error";
        return String(value);
      } catch {
        return "Error";
      }
    }

    function joinRoom() {
      const roomId = roomIdEl.value.trim();
      if (!roomId) return alert("اكتب كود الغرفة أولًا");
      if (!db) return alert("فعّل firebaseConfig أولًا داخل الكود.");

      currentRole = roleEl.value;
      roomRef = ref(db, "rooms/" + roomId);

      onValue(roomRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) {
          liveOperationEl.textContent = "0";
          metaInfoEl.textContent = "لا يوجد نشاط بعد";
          return;
        }
        liveOperationEl.textContent = data.operation || "0";
        expressionInputEl.value = data.operation || "";
        metaInfoEl.textContent = "آخر تعديل بواسطة: " + (data.lastRole || "-");
      });

      update(roomRef, {
        connectedRole: currentRole,
        updatedAt: serverTimestamp()
      });

      statusEl.textContent = "متصل بالغرفة: " + roomId + " | الدور: " + (currentRole === "writer" ? "كاتب" : "مصحح");
    }

    joinBtn.addEventListener("click", joinRoom);

    copyBtn.addEventListener("click", async () => {
      const roomId = roomIdEl.value.trim();
      if (!roomId) return alert("اكتب كود الغرفة أولًا");
      await navigator.clipboard.writeText(roomId);
      alert("تم نسخ كود الغرفة");
    });

    sendBtn.addEventListener("click", async () => {
      if (!roomRef) return alert("ادخل الغرفة أولًا");
      const operation = expressionInputEl.value.trim();
      await set(roomRef, {
        operation,
        lastRole: currentRole,
        updatedAt: serverTimestamp()
      });
    });

    calcBtn.addEventListener("click", () => {
      resultInputEl.value = safeCalc(expressionInputEl.value.trim());
    });
  </script>
</body>
</html>
